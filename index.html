<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro: Desenvolvimento e Sustentabilidade</title>
    <!-- ESTA LINHA É A MAIS IMPORTANTE PARA O ESTILO FUNCIONAR -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">AgroSustentável</div>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Biblioteca</a></li>
                <li><a href="#">Tecnologias</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Agro é Forte: Equilíbrio e Ciência</h1>
            <p>Desenvolvimento e Sustentabilidade para o futuro do campo.</p>
            <button class="btn-cta" onclick="scrollParaConteudo()">Explorar Agora</button>
        </div>
    </section>

    <main class="container" id="conteudo">
        <h2 class="section-title">Aprenda Brincando com a Ciência</h2>
        <div class="card-grid">
            <div class="card" onclick="aprender('Ecologia')">
                <div class="card-icon">🌱</div>
                <h3>Ecologia</h3>
                <p>Proteção de florestas e águas.</p>
                <button class="btn-play">Jogar</button>
            </div>
            <div class="card" onclick="aprender('Tecnologia')">
                <div class="card-icon">🚀</div>
                <h3>Agro Digital</h3>
                <p>APIs e inovações tecnológicas.</p>
                <button class="btn-play">Descobrir</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
